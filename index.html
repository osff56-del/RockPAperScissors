<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper scissors</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <heading>
        <div class="heading">
            <h1 class="maintitle">Rock Paper scissors</h1>
        </div>
    </heading>
    <div class="everything-container">
        <div class="score">
            <div class="fscore cpu-score">
                <h2>Computer Score</h2>
            </div>
            <div class="fscore human-score">
                <h2>Human Score</h2>
            </div>
        </div>
        <div class="game-log">

        </div>
        <div class="buttons">
            <button class="btn scissors">Scissors</button>
            <button class="btn rock">Rock</button>
            <button class="btn paper">Paper</button>

    </div>
</body>
</html>
